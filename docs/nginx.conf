# PersonalAgent — Nginx (HTTP).
#
# Run `sudo certbot --nginx -d <domain>` afterwards to add SSL automatically
# (Telegram webhooks require valid HTTPS).
#
# Placeholders (__DOMAIN__, __ROOT__, __PHP_SOCK__) are substituted by deploy.sh.
# To use manually, replace them and copy to /etc/nginx/sites-available/.

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;
    root __ROOT__;

    # The only public endpoint is the Telegram webhook.
    location = /webhook.php {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:__PHP_SOCK__;
    }

    # Everything else is unavailable — protects .env, storage/, vendor/, .git/
    # and the source code from being served.
    location / {
        return 404;
    }

    access_log /var/log/nginx/personalagent.access.log;
    error_log  /var/log/nginx/personalagent.error.log;
}
